<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnes AI 全能工具箱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #f0f4fe 0%, #e9eff9 100%);
            padding: 28px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 48px;
            box-shadow: 0 30px 80px rgba(0, 20, 60, 0.12), 0 10px 30px rgba(0, 0, 0, 0.04);
            padding: 34px 36px 44px;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
        .header h1 { font-size: 30px; font-weight: 700; color: #0b1a33; display: flex; align-items: center; gap: 14px; letter-spacing: -0.4px; }
        .header h1 small { font-size: 16px; font-weight: 500; color: #4a6a8b; background: rgba(91, 124, 250, 0.12); padding: 4px 18px; border-radius: 40px; }
        .subhead { color: #3a5070; font-size: 15px; padding-left: 20px; border-left: 4px solid #5b7cfa; background: rgba(91, 124, 250, 0.06); border-radius: 0 14px 14px 0; padding: 10px 20px; margin-bottom: 28px; line-height: 1.5; }
        .key-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; background: rgba(255,255,255,0.7); backdrop-filter: blur(4px); padding: 12px 20px; border-radius: 60px; border: 1px solid rgba(200,212,230,0.5); margin-bottom: 28px; }
        .key-row label { font-weight: 600; color: #1f2a41; font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .key-row input { flex: 1; min-width: 220px; padding: 10px 18px; border: 1.5px solid #dce2ec; border-radius: 40px; font-size: 14px; font-family: 'JetBrains Mono', monospace; background: #ffffff; transition: 0.2s; color: #0b1a33; }
        .key-row input:focus { border-color: #5b7cfa; outline: none; box-shadow: 0 0 0 4px rgba(91,124,250,0.12); }
        .tabs { display: flex; gap: 6px; border-bottom: 2px solid rgba(200,212,230,0.5); margin-bottom: 30px; flex-wrap: wrap; }
        .tab-btn { padding: 12px 32px; font-size: 16px; font-weight: 600; background: transparent; border: none; border-bottom: 3px solid transparent; cursor: pointer; color: #6a7e9e; transition: all 0.2s ease; border-radius: 16px 16px 0 0; display: flex; align-items: center; gap: 8px; }
        .tab-btn:hover { color: #0b1a33; background: rgba(91,124,250,0.06); }
        .tab-btn.active { color: #0b1a33; border-bottom-color: #5b7cfa; background: rgba(91,124,250,0.08); }
        .tab-panel { display: none; animation: fadeUp 0.25s ease; }
        .tab-panel.active { display: block; }
        @keyframes fadeUp { 0% { opacity: 0.3; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label { font-size: 13px; font-weight: 600; color: #1f2a41; display: flex; align-items: center; gap: 6px; }
        .form-group label .badge { font-weight: 400; font-size: 11px; background: #eef2f9; padding: 0 12px; border-radius: 20px; color: #3c4e6b; }
        .form-group input, .form-group select, .form-group textarea { padding: 10px 16px; border: 1.5px solid #dce2ec; border-radius: 16px; font-size: 14px; font-family: inherit; background: #ffffff; transition: 0.2s; color: #0f1a2f; width: 100%; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #5b7cfa; outline: none; box-shadow: 0 0 0 4px rgba(91,124,250,0.08); }
        .form-group textarea { resize: vertical; min-height: 72px; }
        .hint { font-size: 12px; color: #8d9db0; margin-top: 3px; }

        /* ---------- 统一所有按钮样式 ---------- */
        /* 本地上传按钮 */
        .btn-upload {
            background: #eef2f9;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            color: #1f2a41;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid transparent;
            white-space: nowrap;
            max-width: 140px;
            flex-shrink: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .btn-upload:hover { background: #dce4f0; border-color: #b0c4de; transform: scale(1.02); }
        .btn-upload:active { transform: scale(0.96); }

        /* 添加图片按钮 - 与上面完全一致，仅背景色微调以示区别，但宽度一致 */
        .add-btn {
            background: #e3f0ff;
            border: 1px dashed #5b7cfa;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            color: #1a2b4c;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            max-width: 140px;
            flex-shrink: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 4px;
        }
        .add-btn:hover { background: #d0e3ff; }
        .add-btn.hidden { display: none; }

        /* 图片输入项布局 - 确保按钮在一行 */
        .image-url-item {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: nowrap;
        }
        .image-url-item input[type="text"] {
            flex: 1;
            min-width: 0;
            padding: 8px 12px;
            border: 1.5px solid #dce2ec;
            border-radius: 16px;
            font-size: 14px;
            background: #fff;
            transition: 0.2s;
        }
        .image-url-item input[type="text"]:focus {
            border-color: #5b7cfa;
            outline: none;
            box-shadow: 0 0 0 4px rgba(91,124,250,0.08);
        }
        .image-url-item .btn-remove {
            background: #ffebee;
            color: #b71c1c;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            flex-shrink: 0;
            white-space: nowrap;
        }
        .image-url-item .btn-remove:hover { background: #ffcdd2; }

        /* 提示文字与按钮同行，允许换行 */
        .hint {
            display: inline;
            margin-left: 8px;
            font-size: 12px;
            color: #8d9db0;
        }

        /* 主按钮 */
        .btn {
            background: #1a2b4c;
            color: white;
            border: none;
            padding: 12px 36px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 16px rgba(26,43,76,0.12);
            margin-top: 8px;
            white-space: nowrap;
        }
        .btn:hover:not(:disabled) {
            background: #0f1d38;
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(26,43,76,0.18);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.25);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .btn.loading .spinner { display: inline-block; }
        .btn.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-secondary { background: #3b5a8a; }
        .btn-secondary:hover:not(:disabled) { background: #2a4570; }

        .flex-row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; margin-top: 6px; }
        .result-box { margin-top: 30px; border-top: 2px dashed rgba(200,212,230,0.6); padding-top: 26px; }
        .preview { background: rgba(248,250,254,0.7); backdrop-filter: blur(4px); border-radius: 24px; padding: 24px; text-align: center; min-height: 120px; border: 1px solid rgba(220,226,236,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .preview img, .preview video { max-width: 100%; max-height: 420px; border-radius: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.06); background: #fff; }
        .preview .placeholder { color: #8d9db0; font-size: 16px; font-weight: 500; }
        .json-log { background: #0d1a2e; color: #d4e2ff; padding: 18px 22px; border-radius: 20px; font-family: 'JetBrains Mono', monospace; font-size: 13px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; max-height: 280px; overflow-y: auto; margin-top: 18px; border: 1px solid #1e3150; }
        .json-log .log-label { color: #8aa1d9; font-weight: 600; font-size: 12px; display: block; margin-bottom: 8px; }
        .error-msg { background: #fff1f0; border: 1px solid #ffccc7; color: #b71c1c; padding: 12px 20px; border-radius: 16px; margin-top: 14px; }

        @media (max-width: 768px) {
            .container { padding: 20px 16px; border-radius: 28px; }
            .form-grid { grid-template-columns: 1fr; gap: 14px; }
            .header h1 { font-size: 24px; flex-wrap: wrap; }
            .tabs .tab-btn { padding: 10px 20px; font-size: 14px; }
            .key-row { flex-direction: column; align-items: stretch; border-radius: 28px; padding: 16px; }
            .btn { width: 100%; justify-content: center; }
            .flex-row { flex-direction: column; align-items: stretch; }
            .image-url-item { flex-wrap: wrap; }
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #eef2f9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #b0c4de; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #8da3c0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🧠 Agnes AI <small>全能工具箱</small></h1>
        <span style="font-size:14px; color:#4a6a8b; background:#eef2f9; padding:4px 16px; border-radius:40px;">v3.5</span>
    </div>
    <div class="subhead">⚡ 对话 · 图像生成 · 视频生成 · 多模态多图 </div>

    <!-- API Key -->
    <div class="key-row">
        <label>🔑 API Key</label>
        <input type="password" id="apiKeyInput" value="sk-wxDpwqHtkyz9XLe8CCPfNBc86098poYLvKR0ZIBpOlgt814g" placeholder="输入您的 API Key">
        <span style="font-size:13px; color:#6b7e9c; background:#eef2f9; padding:4px 12px; border-radius:30px;">已预填</span>
    </div>

    <!-- 选项卡 -->
    <div class="tabs" id="tabHeaders">
        <button class="tab-btn active" data-tab="chat">💬 对话</button>
        <button class="tab-btn" data-tab="image">🖼️ 图像</button>
        <button class="tab-btn" data-tab="video">🎬 视频</button>
    </div>

    <!-- 对话面板 -->
    <div class="tab-panel active" id="panel-chat">
        <div class="form-grid">
            <div class="form-group"><label>模型 <span class="badge">必选</span></label><select id="chatModel"><option value="agnes-1.5-flash">Agnes-1.5-Flash (轻量多模态)</option><option value="agnes-2.0-flash" selected>Agnes-2.0-Flash (强大推理/工具)</option></select></div>
            <div class="form-group"><label>温度 (temperature)</label><input type="number" id="chatTemp" value="0.7" step="0.1" min="0" max="2"></div>
            <div class="form-group full"><label>系统提示 <span class="badge">可选</span></label><textarea id="chatSystem" rows="2" placeholder="你是一个乐于助人的AI助手...">你是一个智能助手，请用中文回答。</textarea></div>
            <div class="form-group full"><label>用户消息 <span class="badge">必填</span></label><textarea id="chatUser" rows="3" placeholder="输入你的问题或指令...">请用中文简单介绍一下Agnes。</textarea></div>
            <div class="form-group full">
                <label>图片（多模态） <span class="badge">可选，支持多张</span></label>
                <div id="chatUrlList"></div>
                <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 4px;">
                    <button class="add-btn" id="chatAddBtn">➕ 添加图片</button>
                    <span class="hint">支持多张图片，可独立上传或输入URL/Base64，模型将同时理解。</span>
                </div>
            </div>
        </div>
        <div class="flex-row">
            <button class="btn" id="chatBtn"><span class="spinner"></span><span class="btn-text">🚀 发送对话</span></button>
            <button class="btn btn-secondary" id="chatStreamBtn"><span class="spinner"></span><span class="btn-text">📡 流式输出</span></button>
        </div>
        <div class="result-box">
            <div class="preview" id="chatPreview">
                <div class="placeholder" id="chatPlaceholder">💬 模型回复将显示在此</div>
                <div id="chatContent" style="width:100%; text-align:left; white-space:pre-wrap; word-break:break-word; display:none;"></div>
            </div>
            <div class="json-log" id="chatLog"><span class="log-label">📋 响应日志</span>等待请求...</div>
            <div id="chatError"></div>
        </div>
    </div>

    <!-- 图像面板 -->
    <div class="tab-panel" id="panel-image">
        <div class="form-grid">
            <div class="form-group"><label>模型 <span class="badge">必选</span></label><select id="imgModel"><option value="agnes-image-2.0-flash">Agnes-Image-2.0-Flash (文/图/多图合成)</option><option value="agnes-image-2.1-flash" selected>Agnes-Image-2.1-Flash (高信息密度)</option></select></div>
            <div class="form-group"><label>生成模式</label><select id="imgMode"><option value="txt2img">文生图</option><option value="img2img">图生图 (单图)</option><option value="multi">多图合成 (≥2图)</option></select></div>
            <div class="form-group full"><label>提示词 <span class="badge">必填</span></label><textarea id="imgPrompt" rows="3">A futuristic city marketplace filled with flying vehicles, holographic signs, dense crowds, neon lighting, cinematic realism</textarea></div>
            <div class="form-group"><label>尺寸 (宽x高)</label><input type="text" id="imgSize" value="1024x768" placeholder="例如 1024x768"></div>
            <div class="form-group"><label>返回格式</label><select id="imgFormat"><option value="url">图片 URL</option><option value="b64">Base64</option></select></div>
            <div class="form-group full" id="imgUrlsGroup">
                <label>图片 URL 列表 <span class="badge">图生图/多图必填</span></label>
                <div id="imgUrlList"></div>
                <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 4px;">
                    <button class="add-btn" id="imgAddBtn">➕ 添加图片</button>
                    <span class="hint">每个图片可独立上传或输入URL/Base64。图生图只需保留一个，多图合成至少两个。</span>
                </div>
            </div>
        </div>
        <button class="btn" id="imgBtn"><span class="spinner"></span><span class="btn-text">🎨 生成图像</span></button>
        <div class="result-box">
            <div class="preview" id="imgPreview"><div class="placeholder" id="imgPlaceholder">🖼️ 生成的图片将显示在此</div><img id="imgResult" style="display:none; max-width:100%; max-height:400px;" alt="生成结果"></div>
            <div class="json-log" id="imgLog"><span class="log-label">📋 响应日志</span>等待生成...</div>
            <div id="imgError"></div>
        </div>
    </div>

    <!-- 视频面板 -->
    <div class="tab-panel" id="panel-video">
        <div class="form-grid">
            <div class="form-group full"><label>模型</label><select id="videoModel" disabled><option value="agnes-video-v2.0">Agnes-Video-V2.0 (固定)</option></select><span class="hint">视频生成使用固定模型 agnes-video-v2.0</span></div>
            <div class="form-group full"><label>生成模式</label><select id="videoMode"><option value="txt2vid">文生视频</option><option value="img2vid">图生视频 (单图)</option><option value="multi">多图视频 (≥2图)</option><option value="keyframes">关键帧动画 (≥2图)</option></select></div>
            <div class="form-group full"><label>提示词 <span class="badge">必填</span></label><textarea id="videoPrompt" rows="3">A cinematic shot of a cat walking on the beach at sunset, soft ocean waves, warm golden lighting, realistic motion</textarea></div>
            <div class="form-group"><label>宽度 (width)</label><input type="number" id="videoWidth" value="1152" placeholder="默认1152"></div>
            <div class="form-group"><label>高度 (height)</label><input type="number" id="videoHeight" value="768" placeholder="默认768"></div>
            <div class="form-group"><label>帧数 (num_frames) <span class="badge">≤441, 8n+1</span></label><input type="number" id="videoFrames" value="121" placeholder="121"></div>
            <div class="form-group"><label>帧率 (frame_rate) <span class="badge">1-60</span></label><input type="number" id="videoFps" value="24" placeholder="24"></div>
            <div class="form-group full" id="videoUrlsGroup">
                <label>图片 URL 列表 <span class="badge">图生/多图/关键帧必填</span></label>
                <div id="videoUrlList"></div>
                <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 4px;">
                    <button class="add-btn" id="videoAddBtn">➕ 添加图片</button>
                    <span class="hint">每个图片可独立上传或输入URL/Base64。图生视频只需一个，多图/关键帧至少两个。</span>
                </div>
            </div>
        </div>
        <button class="btn" id="videoBtn"><span class="spinner"></span><span class="btn-text">🎬 生成视频 (异步)</span></button>
        <div class="result-box">
            <div class="preview" id="videoPreview"><div class="placeholder" id="videoPlaceholder">🎥 生成的视频将显示在此</div><video id="videoResult" controls style="display:none; max-width:100%; max-height:400px; border-radius:20px;"></video></div>
            <div class="json-log" id="videoLog"><span class="log-label">📋 任务日志</span>等待提交...</div>
            <div id="videoError"></div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- DOM ----------
        const apiKeyInput = document.getElementById('apiKeyInput');
        // Chat
        const chatModel = document.getElementById('chatModel');
        const chatTemp = document.getElementById('chatTemp');
        const chatSystem = document.getElementById('chatSystem');
        const chatUser = document.getElementById('chatUser');
        const chatBtn = document.getElementById('chatBtn');
        const chatStreamBtn = document.getElementById('chatStreamBtn');
        const chatPlaceholder = document.getElementById('chatPlaceholder');
        const chatContent = document.getElementById('chatContent');
        const chatLog = document.getElementById('chatLog');
        const chatError = document.getElementById('chatError');
        const chatUrlList = document.getElementById('chatUrlList');
        const chatAddBtn = document.getElementById('chatAddBtn');
        // Image
        const imgModel = document.getElementById('imgModel');
        const imgMode = document.getElementById('imgMode');
        const imgPrompt = document.getElementById('imgPrompt');
        const imgSize = document.getElementById('imgSize');
        const imgFormat = document.getElementById('imgFormat');
        const imgBtn = document.getElementById('imgBtn');
        const imgPlaceholder = document.getElementById('imgPlaceholder');
        const imgResult = document.getElementById('imgResult');
        const imgLog = document.getElementById('imgLog');
        const imgError = document.getElementById('imgError');
        const imgUrlList = document.getElementById('imgUrlList');
        const imgAddBtn = document.getElementById('imgAddBtn');
        // Video
        const videoMode = document.getElementById('videoMode');
        const videoPrompt = document.getElementById('videoPrompt');
        const videoWidth = document.getElementById('videoWidth');
        const videoHeight = document.getElementById('videoHeight');
        const videoFrames = document.getElementById('videoFrames');
        const videoFps = document.getElementById('videoFps');
        const videoBtn = document.getElementById('videoBtn');
        const videoPlaceholder = document.getElementById('videoPlaceholder');
        const videoResult = document.getElementById('videoResult');
        const videoLog = document.getElementById('videoLog');
        const videoError = document.getElementById('videoError');
        const videoUrlList = document.getElementById('videoUrlList');
        const videoAddBtn = document.getElementById('videoAddBtn');

        // ---------- 工具函数 ----------
        function getApiKey() { return apiKeyInput.value.trim(); }
        function showError(container, msg) { container.innerHTML = `<div class="error-msg">❌ ${msg}</div>`; }
        function clearError(container) { container.innerHTML = ''; }
        function setLoading(btn, loading) {
            if (loading) { btn.classList.add('loading'); btn.disabled = true; }
            else { btn.classList.remove('loading'); btn.disabled = false; }
        }
        function updateLog(elem, content, label = '📋 响应日志') {
            elem.innerHTML = `<span class="log-label">${label}</span>${content}`;
        }

        // ---------- 选项卡 ----------
        const tabBtns = document.querySelectorAll('.tab-btn');
        const panels = { chat: document.getElementById('panel-chat'), image: document.getElementById('panel-image'), video: document.getElementById('panel-video') };
        tabBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                tabBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const tab = this.dataset.tab;
                Object.keys(panels).forEach(key => panels[key].classList.toggle('active', key === tab));
                clearError(chatError); clearError(imgError); clearError(videoError);
            });
        });

        // ---------- 通用图片列表管理 ----------
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function createImageItem(container, value = '') {
            const div = document.createElement('div');
            div.className = 'image-url-item';

            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'img-url-input';
            input.placeholder = '输入图片URL或Base64...';
            input.value = value;

            const uploadBtn = document.createElement('button');
            uploadBtn.className = 'btn-upload';
            uploadBtn.textContent = '📤 本地上传';
            uploadBtn.type = 'button';

            const removeBtn = document.createElement('button');
            removeBtn.className = 'btn-remove';
            removeBtn.textContent = '✕ 删除';
            removeBtn.type = 'button';

            div.appendChild(input);
            div.appendChild(uploadBtn);
            div.appendChild(removeBtn);
            container.appendChild(div);

            uploadBtn.addEventListener('click', function(e) {
                e.preventDefault();
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = 'image/*';
                fileInput.onchange = async function(ev) {
                    const file = ev.target.files[0];
                    if (!file) return;
                    const originalText = uploadBtn.textContent;
                    uploadBtn.textContent = '⏳ 转换中...';
                    uploadBtn.disabled = true;
                    try {
                        const dataUri = await fileToBase64(file);
                        input.value = dataUri;
                        input.dispatchEvent(new Event('input'));
                        alert('✅ 已转换图片为Base64并填入');
                    } catch (err) {
                        alert('❌ 转换失败：' + err.message);
                    } finally {
                        uploadBtn.textContent = originalText;
                        uploadBtn.disabled = false;
                    }
                };
                fileInput.click();
            });

            removeBtn.addEventListener('click', function() {
                const parent = container;
                const itemCount = parent.children.length;
                let minCount = 1;
                if (parent === imgUrlList && imgMode.value === 'multi') {
                    minCount = 2;
                } else if (parent === videoUrlList && (videoMode.value === 'multi' || videoMode.value === 'keyframes')) {
                    minCount = 2;
                }
                if (itemCount <= minCount) {
                    alert(`至少保留 ${minCount} 个图片输入框`);
                    return;
                }
                parent.removeChild(div);
            });

            return div;
        }

        function getImageUrls(container) {
            const inputs = container.querySelectorAll('.img-url-input');
            return Array.from(inputs).map(inp => inp.value.trim()).filter(v => v.length > 0);
        }

        // ---------- 初始化列表 ----------
        function initChatList(count = 1) {
            chatUrlList.innerHTML = '';
            for (let i = 0; i < count; i++) {
                createImageItem(chatUrlList, '');
            }
        }
        function initImageList(count = 1) {
            imgUrlList.innerHTML = '';
            for (let i = 0; i < count; i++) {
                createImageItem(imgUrlList, '');
            }
        }
        function initVideoList(count = 1) {
            videoUrlList.innerHTML = '';
            for (let i = 0; i < count; i++) {
                createImageItem(videoUrlList, '');
            }
        }

        // ---------- 模式联动 ----------
        function updateImageMode() {
            const mode = imgMode.value;
            const group = document.getElementById('imgUrlsGroup');
            const addBtn = imgAddBtn;
            if (mode === 'txt2img') {
                group.style.display = 'none';
                addBtn.classList.add('hidden');
                return;
            }
            group.style.display = 'block';
            if (mode === 'multi') {
                addBtn.classList.remove('hidden');
                const currentCount = imgUrlList.children.length;
                if (currentCount < 2) {
                    const needed = 2 - currentCount;
                    for (let i = 0; i < needed; i++) {
                        createImageItem(imgUrlList, '');
                    }
                }
            } else {
                addBtn.classList.add('hidden');
                while (imgUrlList.children.length > 1) {
                    imgUrlList.removeChild(imgUrlList.lastChild);
                }
            }
        }
        imgMode.addEventListener('change', updateImageMode);

        function updateVideoMode() {
            const mode = videoMode.value;
            const group = document.getElementById('videoUrlsGroup');
            const addBtn = videoAddBtn;
            if (mode === 'txt2vid') {
                group.style.display = 'none';
                addBtn.classList.add('hidden');
                return;
            }
            group.style.display = 'block';
            if (mode === 'multi' || mode === 'keyframes') {
                addBtn.classList.remove('hidden');
                const currentCount = videoUrlList.children.length;
                if (currentCount < 2) {
                    const needed = 2 - currentCount;
                    for (let i = 0; i < needed; i++) {
                        createImageItem(videoUrlList, '');
                    }
                }
            } else {
                addBtn.classList.add('hidden');
                while (videoUrlList.children.length > 1) {
                    videoUrlList.removeChild(videoUrlList.lastChild);
                }
            }
        }
        videoMode.addEventListener('change', updateVideoMode);

        // 添加按钮事件
        chatAddBtn.addEventListener('click', function() {
            createImageItem(chatUrlList, '');
        });
        imgAddBtn.addEventListener('click', function() {
            createImageItem(imgUrlList, '');
        });
        videoAddBtn.addEventListener('click', function() {
            createImageItem(videoUrlList, '');
        });

        // ---------- 对话提交 ----------
        async function callChat(stream = false) {
            clearError(chatError);
            const key = getApiKey();
            if (!key) { showError(chatError, '请输入 API Key'); return; }
            const model = chatModel.value;
            const temp = parseFloat(chatTemp.value) || 0.7;
            const system = chatSystem.value.trim();
            const user = chatUser.value.trim();
            const imageUrls = getImageUrls(chatUrlList);
            if (!user) { showError(chatError, '请输入用户消息'); return; }

            const messages = [];
            if (system) messages.push({ role: 'system', content: system });

            let userContent;
            if (imageUrls.length === 0) {
                userContent = user;
            } else {
                userContent = [{ type: 'text', text: user }];
                imageUrls.forEach(url => {
                    userContent.push({ type: 'image_url', image_url: { url: url } });
                });
            }
            messages.push({ role: 'user', content: userContent });

            const payload = { model, messages, temperature: temp, stream };
            const btn = stream ? chatStreamBtn : chatBtn;
            setLoading(btn, true);
            chatPlaceholder.style.display = 'none';
            chatContent.style.display = 'block';
            chatContent.textContent = stream ? '⏳ 流式接收中...' : '⏳ 生成中...';
            updateLog(chatLog, '请求发送中...', '📡 请求详情');
            try {
                const resp = await fetch('https://apihub.agnes-ai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!resp.ok) { const errText = await resp.text(); throw new Error(`HTTP ${resp.status}: ${errText}`); }
                if (stream) {
                    const reader = resp.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let fullText = '', buffer = '';
                    chatContent.textContent = '';
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop() || '';
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const data = line.slice(6);
                                if (data === '[DONE]') continue;
                                try {
                                    const json = JSON.parse(data);
                                    const delta = json.choices?.[0]?.delta?.content;
                                    if (delta) { fullText += delta; chatContent.textContent = fullText; }
                                } catch (e) {}
                            }
                        }
                    }
                    updateLog(chatLog, JSON.stringify({ full_text: fullText }, null, 2), '📋 流式响应完成');
                    if (!fullText) chatContent.textContent = '(无内容返回)';
                } else {
                    const json = await resp.json();
                    updateLog(chatLog, JSON.stringify(json, null, 2), '📋 响应');
                    chatContent.textContent = json.choices?.[0]?.message?.content || '(无内容)';
                }
            } catch (err) {
                showError(chatError, err.message);
                chatContent.textContent = '❌ 请求失败';
                updateLog(chatLog, err.stack || err.message, '⚠️ 错误');
            } finally { setLoading(btn, false); }
        }
        chatBtn.addEventListener('click', () => callChat(false));
        chatStreamBtn.addEventListener('click', () => callChat(true));

        // ---------- 图像生成 ----------
        async function generateImage() {
            clearError(imgError);
            const key = getApiKey();
            if (!key) { showError(imgError, '请输入 API Key'); return; }
            const model = imgModel.value, mode = imgMode.value, prompt = imgPrompt.value.trim(), size = imgSize.value.trim(), format = imgFormat.value;
            if (!prompt) { showError(imgError, '请输入提示词'); return; }
            if (!size || !/^\d+x\d+$/.test(size)) { showError(imgError, '尺寸格式错误，如 1024x768'); return; }
            const payload = { model, prompt, size };
            if (mode !== 'txt2img') {
                const urls = getImageUrls(imgUrlList);
                if (urls.length === 0) { showError(imgError, '请至少输入一个图片URL/Base64'); return; }
                if (mode === 'img2img' && urls.length !== 1) { showError(imgError, '图生图模式仅需一个图片'); return; }
                if (mode === 'multi' && urls.length < 2) { showError(imgError, '多图合成至少需要两个图片'); return; }
                payload.extra_body = { image: urls };
            }
            if (format === 'url') { if (!payload.extra_body) payload.extra_body = {}; payload.extra_body.response_format = 'url'; }
            else {
                if (mode === 'txt2img') payload.return_base64 = true;
                else { if (!payload.extra_body) payload.extra_body = {}; payload.extra_body.response_format = 'b64_json'; }
            }
            setLoading(imgBtn, true);
            imgPlaceholder.style.display = 'none';
            imgResult.style.display = 'none';
            updateLog(imgLog, '请求发送中...', '📡 请求');
            try {
                const resp = await fetch('https://apihub.agnes-ai.com/v1/images/generations', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const json = await resp.json();
                updateLog(imgLog, JSON.stringify(json, null, 2), '📋 响应');
                if (!resp.ok || json.error) { const errMsg = json.error?.message || json.error?.code || `HTTP ${resp.status}`; throw new Error(errMsg); }
                const data = json.data?.[0];
                if (!data) throw new Error('响应缺少 data 字段');
                let imageSrc = data.url || (data.b64_json ? `data:image/png;base64,${data.b64_json}` : null);
                if (imageSrc) { imgResult.src = imageSrc; imgResult.style.display = 'block'; imgPlaceholder.style.display = 'none'; }
                else { throw new Error('未找到图片数据'); }
            } catch (err) { showError(imgError, err.message); imgPlaceholder.style.display = 'block'; imgPlaceholder.textContent = '❌ 生成失败'; }
            finally { setLoading(imgBtn, false); }
        }
        imgBtn.addEventListener('click', generateImage);

        // ---------- 视频生成 ----------
        let videoPollingInterval = null;
        async function generateVideo() {
            clearError(videoError);
            const key = getApiKey();
            if (!key) { showError(videoError, '请输入 API Key'); return; }
            const mode = videoMode.value, prompt = videoPrompt.value.trim();
            const width = parseInt(videoWidth.value) || 1152, height = parseInt(videoHeight.value) || 768;
            const num_frames = parseInt(videoFrames.value) || 121, frame_rate = parseInt(videoFps.value) || 24;
            if (!prompt) { showError(videoError, '请输入提示词'); return; }
            if (num_frames > 441) { showError(videoError, 'num_frames 不能超过 441'); return; }
            if (num_frames % 8 !== 1) { showError(videoError, 'num_frames 必须满足 8n+1 (如 81,121,241)'); return; }
            if (frame_rate < 1 || frame_rate > 60) { showError(videoError, '帧率范围 1-60'); return; }
            const payload = { model: 'agnes-video-v2.0', prompt, width, height, num_frames, frame_rate };
            if (mode !== 'txt2vid') {
                const urls = getImageUrls(videoUrlList);
                if (urls.length === 0) { showError(videoError, '请至少输入一个图片URL/Base64'); return; }
                if (mode === 'img2vid' && urls.length !== 1) { showError(videoError, '图生视频仅需一个图片'); return; }
                if ((mode === 'multi' || mode === 'keyframes') && urls.length < 2) { showError(videoError, '多图/关键帧至少需要两个图片'); return; }
                if (mode === 'img2vid') payload.image = urls[0];
                else { payload.extra_body = { image: urls }; if (mode === 'keyframes') payload.extra_body.mode = 'keyframes'; }
            }
            setLoading(videoBtn, true);
            videoPlaceholder.style.display = 'none';
            videoResult.style.display = 'none';
            updateLog(videoLog, '提交任务中...', '📡 请求');
            try {
                const resp = await fetch('https://apihub.agnes-ai.com/v1/videos', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const json = await resp.json();
                if (!resp.ok || json.error) throw new Error(json.error?.message || json.error?.code || `HTTP ${resp.status}`);
                const videoId = json.video_id;
                if (!videoId) throw new Error('响应中缺少 video_id');
                updateLog(videoLog, JSON.stringify(json, null, 2), '📋 任务创建成功');
                if (videoPollingInterval) clearInterval(videoPollingInterval);
                let attempts = 0;
                const maxAttempts = 120;
                videoPollingInterval = setInterval(async () => {
                    attempts++;
                    try {
                        const queryResp = await fetch(`https://apihub.agnes-ai.com/agnesapi?video_id=${videoId}`, {
                            headers: { 'Authorization': `Bearer ${key}` }
                        });
                        const queryJson = await queryResp.json();
                        if (!queryResp.ok) throw new Error(queryJson.error?.message || `查询失败 ${queryResp.status}`);
                        const status = queryJson.status, progress = queryJson.progress || 0;
                        updateLog(videoLog, `⏳ 状态: ${status} (${progress}%)\n${JSON.stringify(queryJson, null, 2)}`, '📋 轮询中');
                        if (status === 'completed') {
                            clearInterval(videoPollingInterval); videoPollingInterval = null;
                            const videoUrl = queryJson.remixed_from_video_id;
                            if (videoUrl) { videoResult.src = videoUrl; videoResult.style.display = 'block'; videoPlaceholder.style.display = 'none'; }
                            else throw new Error('完成但未返回视频 URL');
                            updateLog(videoLog, `✅ 生成完成\n${JSON.stringify(queryJson, null, 2)}`, '📋 完成');
                            setLoading(videoBtn, false);
                        } else if (status === 'failed') {
                            clearInterval(videoPollingInterval); videoPollingInterval = null;
                            throw new Error(queryJson.error?.message || '视频生成失败');
                        } else if (attempts >= maxAttempts) {
                            clearInterval(videoPollingInterval); videoPollingInterval = null;
                            throw new Error('轮询超时 (10分钟)');
                        }
                    } catch (err) {
                        clearInterval(videoPollingInterval); videoPollingInterval = null;
                        showError(videoError, err.message);
                        updateLog(videoLog, `❌ 错误: ${err.message}`, '⚠️ 异常');
                        setLoading(videoBtn, false);
                    }
                }, 5000);
                setTimeout(() => {
                    if (videoPollingInterval) {
                        clearInterval(videoPollingInterval); videoPollingInterval = null;
                        showError(videoError, '轮询总超时 (10分钟)');
                        setLoading(videoBtn, false);
                    }
                }, 600000);
            } catch (err) {
                showError(videoError, err.message);
                updateLog(videoLog, `❌ 错误: ${err.message}`, '⚠️ 异常');
                setLoading(videoBtn, false);
            }
        }
        videoBtn.addEventListener('click', generateVideo);
        window.addEventListener('beforeunload', function() { if (videoPollingInterval) clearInterval(videoPollingInterval); });

        // ---------- 快捷键 ----------
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                const active = document.activeElement;
                if (active && (active.tagName === 'TEXTAREA' || active.tagName === 'INPUT')) {
                    const activeTab = document.querySelector('.tab-btn.active');
                    if (activeTab) {
                        const tab = activeTab.dataset.tab;
                        if (tab === 'chat') chatBtn.click();
                        else if (tab === 'image') imgBtn.click();
                        else if (tab === 'video') videoBtn.click();
                    }
                }
            }
        });

        // ---------- 初始化 ----------
        initChatList(1);
        initImageList(1);
        initVideoList(1);
        updateImageMode();
        updateVideoMode();

        console.log('✅ Agnes AI 全能工具箱 (最终版) 已加载。');
        console.log('💡 所有"添加图片"按钮宽度已统一为紧凑型，提示文字同行显示。');
    })();
</script>
</body>
</html>
